version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fusehotel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-fusehotel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fusehotel_password}
      POSTGRES_DB: ${DB_NAME:-fusehotel_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fusehotel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fusehotel_user} -d ${DB_NAME:-fusehotel_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fusehotel-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER:-fusehotel_user}:${DB_PASSWORD:-fusehotel_password}@postgres:5432/${DB_NAME:-fusehotel_db}
      JWT_SECRET: ${JWT_SECRET:-fusehotel-super-secret-jwt-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-fusehotel-super-secret-refresh-key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3001
      API_PREFIX: /api
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      UPLOAD_PATH: ./uploads
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: ./logs/app.log
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    ports:
      - "3001:3001"
    networks:
      - fusehotel-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (React + Vite)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost/api}
    container_name: fusehotel-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost/api}
    ports:
      - "8080:8080"
    networks:
      - fusehotel-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: fusehotel-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/uploads:/var/www/uploads:ro
    networks:
      - fusehotel-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  fusehotel-network:
    driver: bridge
    name: fusehotel-network

volumes:
  postgres_data:
    driver: local
    name: fusehotel-postgres-data
