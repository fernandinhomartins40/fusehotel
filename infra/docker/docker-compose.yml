version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fusehotel-postgres
    environment:
      POSTGRES_USER: fusehotel_user
      POSTGRES_PASSWORD: fusehotel_password
      POSTGRES_DB: fusehotel_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fusehotel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fusehotel_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
    container_name: fusehotel-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://fusehotel_user:fusehotel_password@postgres:5432/fusehotel_db
      JWT_SECRET: change-this-super-secret-jwt-key-in-production-min-32-chars
      JWT_REFRESH_SECRET: change-this-super-secret-refresh-key-in-production-min-32-chars
      FRONTEND_URL: http://localhost
    volumes:
      - ../../apps/api/uploads:/app/uploads
      - ../../apps/api/logs:/app/logs
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fusehotel-network

  web:
    build:
      context: ../../apps/web
      dockerfile: ../../infra/docker/Dockerfile.web
    container_name: fusehotel-web
    ports:
      - "8080:80"
    networks:
      - fusehotel-network

  nginx:
    image: nginx:1.25-alpine
    container_name: fusehotel-nginx
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - web
    networks:
      - fusehotel-network

networks:
  fusehotel-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
