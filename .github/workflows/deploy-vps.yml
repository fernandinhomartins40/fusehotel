name: Deploy FuseHotel to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_PASSWORD }}" > ~/.ssh/vps_password
          chmod 600 ~/.ssh/vps_password

      - name: Sync code to VPS
        run: |
          # Instalar sshpass para autenticação com senha
          sudo apt-get update && sudo apt-get install -y sshpass rsync

          # Criar diretório no VPS
          sshpass -f ~/.ssh/vps_password ssh -o StrictHostKeyChecking=no root@72.60.10.108 "mkdir -p /root/fusehotel"

          # Verificar estrutura do projeto antes do rsync
          echo "=== Verificando estrutura localmente antes do rsync ==="
          ls -la apps/api/src/ | head -20
          ls -la apps/web/src/ | head -20

          # Sincronizar código via rsync
          sshpass -f ~/.ssh/vps_password rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='apps/api/dist' \
            --exclude='apps/web/dist' \
            --exclude='apps/api/uploads' \
            --exclude='apps/api/logs' \
            --exclude='.env' \
            --exclude='.env.local' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ root@72.60.10.108:/root/fusehotel/

          # Verificar se código foi copiado
          echo "=== Verificando estrutura na VPS após rsync ==="
          sshpass -f ~/.ssh/vps_password ssh -o StrictHostKeyChecking=no root@72.60.10.108 "ls -la /root/fusehotel/apps/api/src/ | head -20"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 72.60.10.108
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 1800s
          command_timeout: 1800s
          script: |
            set -e

            echo "=== Iniciando Deploy FuseHotel ==="

            # Diretório da aplicação
            APP_DIR="/root/fusehotel"
            cd $APP_DIR

            # ===== VERIFICAÇÃO PRÉ-DEPLOY =====
            echo "=== Executando verificação pré-deploy ==="
            if [ -f "scripts/pre-deploy-check.sh" ]; then
              chmod +x scripts/pre-deploy-check.sh
              if bash scripts/pre-deploy-check.sh; then
                echo "✅ Verificação pré-deploy passou"
              else
                echo "⚠️ Verificação pré-deploy teve avisos - continuando deploy"
              fi
            else
              echo "⚠️ Script pre-deploy-check.sh não encontrado, pulando verificação"
            fi
            echo ""

            # ===== BACKUP PRÉ-DEPLOY =====
            echo "=== Criando backup pré-deploy ==="
            if [ -f "scripts/auto-backup-uploads.sh" ]; then
              chmod +x scripts/auto-backup-uploads.sh
              if bash scripts/auto-backup-uploads.sh; then
                echo "✅ Backup pré-deploy criado com sucesso"
              else
                echo "⚠️ Backup pré-deploy falhou, mas continuando deploy"
              fi
            else
              echo "⚠️ Script auto-backup-uploads.sh não encontrado, pulando backup"
            fi
            echo ""

            # Parar containers existentes (SEM -v para preservar volumes)
            echo "Parando containers existentes..."
            docker-compose -f docker-compose.vps.yml down || true

            # Verificar e garantir que volumes críticos existam
            echo "=== Verificando volumes Docker ==="
            if ! docker volume ls | grep -q "fusehotel.*uploads_data"; then
              echo "⚠️ Volume uploads_data não existe, será criado no próximo docker-compose up"
            else
              echo "✓ Volume uploads_data encontrado"
              docker volume inspect $(docker volume ls --format '{{.Name}}' | grep "fusehotel.*uploads_data") | grep Mountpoint || true
            fi

            if ! docker volume ls | grep -q "fusehotel.*postgres_data"; then
              echo "⚠️ Volume postgres_data não existe, será criado no próximo docker-compose up"
            else
              echo "✓ Volume postgres_data encontrado"
            fi

            echo "Verificando código sincronizado..."
            ls -la

            # Criar arquivo .env
            echo "Criando arquivo .env..."
            cat > .env << 'ENVEOF'
NODE_ENV=production
PORT=3001
POSTGRES_USER=fusehotel
POSTGRES_PASSWORD=fusehotel2024secure
POSTGRES_DB=fusehotel
DATABASE_URL=postgresql://fusehotel:fusehotel2024secure@postgres:5432/fusehotel
JWT_SECRET=fusehotel-production-jwt-secret-key-2024
JWT_REFRESH_SECRET=fusehotel-production-refresh-secret-key-2024
JWT_EXPIRES_IN=7d
JWT_ADMIN_EXPIRES_IN=8h
FRONTEND_URL=https://www.perolahotel.com
CORS_ORIGIN=https://www.perolahotel.com,http://www.perolahotel.com,https://perolahotel.com,http://perolahotel.com,http://72.60.10.108:3091,http://localhost:3091
LOG_LEVEL=info
RUN_SEED=true
ENVEOF

            # Evitar prune global: esta VPS hospeda outros projetos.
            # O deploy deve tocar apenas nos recursos do FuseHotel.
            echo "Pulando prune global de Docker para preservar imagens e evitar timeouts..."

            # ===== VALIDAÇÃO PRÉ-BUILD: Verificar estrutura do projeto =====
            echo "=== Validando estrutura do projeto antes do build ==="

            if [ ! -f "apps/api/src/server.ts" ]; then
              echo "❌ ERRO: server.ts não encontrado!"
              exit 1
            fi
            echo "✓ server.ts encontrado"

            if [ ! -f "apps/api/src/app.ts" ]; then
              echo "❌ ERRO: app.ts não encontrado!"
              exit 1
            fi
            echo "✓ app.ts encontrado"

            if [ ! -f "apps/api/src/prisma/schema.prisma" ]; then
              echo "❌ ERRO: schema.prisma não encontrado!"
              exit 1
            fi
            echo "✓ schema.prisma encontrado"

            if [ ! -d "apps/web/src" ]; then
              echo "❌ ERRO: diretório web/src não encontrado!"
              exit 1
            fi
            echo "✓ Estrutura web encontrada"

            # Validar rotas críticas
            if [ ! -d "apps/api/src/routes" ]; then
              echo "❌ ERRO: diretório routes não encontrado!"
              exit 1
            fi
            echo "✓ Routes encontrado"

            if [ ! -d "apps/api/src/controllers" ]; then
              echo "❌ ERRO: diretório controllers não encontrado!"
              exit 1
            fi
            echo "✓ Controllers encontrado"

            if [ ! -d "apps/api/src/services" ]; then
              echo "❌ ERRO: diretório services não encontrado!"
              exit 1
            fi
            echo "✓ Services encontrado"

            echo "=== Todos os arquivos críticos validados ==="

            # ===== LIMPEZA COMPLETA DE CONTAINERS ANTIGOS =====
            echo "=== Parando e removendo containers antigos (preservando volumes) ==="

            # Parar todos os containers do fusehotel primeiro
            echo "Parando containers..."
            docker stop fusehotel-api-vps fusehotel-web-vps fusehotel-nginx-vps fusehotel-postgres-vps 2>/dev/null || true

            # Garantir que docker-compose pare tudo
            docker-compose -f docker-compose.vps.yml down --remove-orphans || true

            # Forçar remoção de containers específicos (caso ainda existam)
            echo "Removendo containers forçadamente..."
            docker rm -f fusehotel-api-vps 2>/dev/null || true
            docker rm -f fusehotel-web-vps 2>/dev/null || true
            docker rm -f fusehotel-nginx-vps 2>/dev/null || true
            docker rm -f fusehotel-postgres-vps 2>/dev/null || true

            # Verificar se todos foram removidos
            echo "Verificando se containers foram removidos..."
            if docker ps -a | grep -E "fusehotel-(api|web|nginx|postgres)-vps"; then
              echo "⚠️ Alguns containers ainda existem, forçando remoção novamente..."
              docker ps -a | grep -E "fusehotel-(api|web|nginx|postgres)-vps" | awk '{print $1}' | xargs -r docker rm -f
            fi
            echo "✅ Todos os containers antigos foram removidos"

            # Build das imagens Docker em sequência para reduzir pico de carga
            echo "Construindo imagem da API..."
            docker-compose -f docker-compose.vps.yml build api || { echo "❌ Erro ao construir imagem da API"; exit 1; }

            echo "Construindo imagem do Web..."
            docker-compose -f docker-compose.vps.yml build web || { echo "❌ Erro ao construir imagem do Web"; exit 1; }

            echo "✅ Imagens Docker construídas com sucesso"

            # Iniciar containers (com force-recreate para garantir containers novos)
            echo "Iniciando containers..."
            docker-compose -f docker-compose.vps.yml up -d --force-recreate --remove-orphans || { echo "❌ Erro ao iniciar containers"; exit 1; }
            echo "✅ Containers iniciados"

            # Aguardar containers iniciarem
            echo "Aguardando containers iniciarem..."
            sleep 15

            # Verificar status dos containers
            echo "=== Verificando status dos containers ==="
            docker-compose -f docker-compose.vps.yml ps

            # Verificar se containers estão rodando
            echo "=== Verificando se containers existem ==="
            if ! docker ps -a | grep -q fusehotel-api-vps; then
              echo "❌ Container fusehotel-api-vps não foi criado!"
              docker-compose -f docker-compose.vps.yml logs
              exit 1
            fi

            if ! docker ps | grep -q fusehotel-api-vps; then
              echo "❌ Container fusehotel-api-vps não está rodando!"
              echo "=== Logs do container API ==="
              docker logs fusehotel-api-vps --tail=100
              exit 1
            fi
            echo "✓ Container fusehotel-api-vps está rodando"

            if ! docker ps | grep -q fusehotel-postgres-vps; then
              echo "❌ Container fusehotel-postgres-vps não está rodando!"
              echo "=== Logs do PostgreSQL ==="
              docker logs fusehotel-postgres-vps --tail=50
              exit 1
            fi
            echo "✓ Container fusehotel-postgres-vps está rodando"

            if ! docker ps | grep -q fusehotel-web-vps; then
              echo "❌ Container fusehotel-web-vps não está rodando!"
              echo "=== Logs do Web ==="
              docker logs fusehotel-web-vps --tail=50
              exit 1
            fi
            echo "✓ Container fusehotel-web-vps está rodando"

            if ! docker ps | grep -q fusehotel-nginx-vps; then
              echo "❌ Container fusehotel-nginx-vps não está rodando!"
              echo "=== Logs do Nginx ==="
              docker logs fusehotel-nginx-vps --tail=50
              exit 1
            fi
            echo "✓ Container fusehotel-nginx-vps está rodando"

            # Aguardar aplicação inicializar completamente sem janela morta fixa
            echo "Aguardando API estabilizar..."
            for i in {1..18}; do
              API_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' fusehotel-api-vps 2>/dev/null || echo "missing")
              POSTGRES_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' fusehotel-postgres-vps 2>/dev/null || echo "missing")
              NGINX_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' fusehotel-nginx-vps 2>/dev/null || echo "missing")

              echo "Tentativa $i/18 - api: $API_HEALTH | postgres: $POSTGRES_HEALTH | nginx: $NGINX_HEALTH"

              if [ "$API_HEALTH" = "healthy" ] && [ "$POSTGRES_HEALTH" = "healthy" ]; then
                echo "✅ API e banco estabilizados"
                break
              fi

              if [ $i -eq 18 ]; then
                echo "❌ API não estabilizou no tempo esperado"
                docker logs fusehotel-api-vps --tail=120 || true
                docker logs fusehotel-postgres-vps --tail=80 || true
                exit 1
              fi

              sleep 5
            done

            # ===== DIAGNÓSTICO: Verificar logs =====
            echo "=== Logs da Aplicação (últimas 100 linhas) ==="
            docker logs fusehotel-api-vps --tail=100

            echo "=== Logs do Nginx ==="
            docker logs fusehotel-nginx-vps --tail=50

            # ===== RECARREGAR NGINX =====
            echo "=== Recarregando Nginx (SEM modificar configurações existentes) ==="

            # IMPORTANTE: Apenas recarrega configuração existente
            # NÃO cria, modifica ou remove arquivos de configuração
            # SSL e configurações das outras aplicações permanecem intactas
            nginx -t && systemctl reload nginx || echo "⚠️ Nginx reload falhou, mas continuando..."
            echo "✅ Nginx recarregado - todas configurações mantidas"

            sleep 3

            # Verificar se está escutando nas portas corretas
            echo ""
            echo "=== Verificando portas em uso ==="
            netstat -tulpn | grep nginx | grep -E ":80 |:443 |:3091 "

            # ===== VERIFICAR HEALTH CHECK =====
            echo "=== Verificando health check ==="
            for i in {1..15}; do
              if curl -f http://localhost:3091/health; then
                echo "✅ FuseHotel está rodando na porta 3091!"

                echo ""
                echo "=== Testando frontend porta 3091 ==="
                curl -I http://localhost:3091 | head -5

                echo ""
                echo "=== Testando HTTPS ==="
                curl -Ik https://perolahotel.com | head -5 || echo "⚠️ SSL ainda não configurado - rode certbot primeiro"

                echo ""
                echo "=== Verificando volume de uploads ==="
                UPLOAD_FILES=$(docker exec fusehotel-api-vps find /app/uploads -type f 2>/dev/null | wc -l || echo "0")
                echo "📁 Arquivos em uploads: $UPLOAD_FILES"

                if [ "$UPLOAD_FILES" -gt 0 ]; then
                  echo "✅ Volume de uploads contém $UPLOAD_FILES arquivo(s)"
                  echo "Exemplos de arquivos:"
                  docker exec fusehotel-api-vps ls -lh /app/uploads | head -5 || true
                else
                  echo "⚠️ Nenhum arquivo encontrado em uploads"
                  echo "Isso é normal para novo deploy. Imagens serão preservadas após upload."
                fi

                echo ""
                echo "✅ Deploy concluído - aplicação está rodando!"
                echo "📍 Domínio: https://perolahotel.com"
                echo "📍 Domínio: https://www.perolahotel.com"
                echo "📍 IP:Porta: http://72.60.10.108:3091"
                echo "📦 Volumes: PERSISTENTES entre deploys"
                exit 0
              fi
              echo "Tentativa $i/15 falhou, aguardando 10s..."

              # Mostrar logs a cada 3 tentativas
              if [ $((i % 3)) -eq 0 ]; then
                echo "=== Logs recentes ==="
                docker logs fusehotel-api-vps --tail=30
                docker logs fusehotel-nginx-vps --tail=20
              fi

              sleep 10
            done

            echo "⚠️ Health check falhou após 15 tentativas"
            echo "Logs completos:"
            docker-compose -f docker-compose.vps.yml logs
            exit 1

      - name: Verify Deployment
        if: success()
        run: |
          echo "✅ Deploy concluído com sucesso!"
          echo "🌐 FuseHotel disponível em: https://www.perolahotel.com"
          echo "🌐 Acesso alternativo: http://72.60.10.108:3091"
          echo "📊 Health check: http://72.60.10.108:3091/health"
          echo ""
          echo "📦 Volumes preservados entre deploys"
          echo "🔒 SSL/Nginx: Configurações existentes mantidas"
