services:
  postgres:
    image: postgres:16-alpine
    container_name: fusehotel-postgres-dev
    environment:
      POSTGRES_PASSWORD: fusehotel_password
      POSTGRES_DB: fusehotel_db
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fusehotel_user -d fusehotel_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
    driver: local
